name: Fault Injection CI
on:
  workflow_dispatch:
    inputs:
      source_file:
        description: Source file to check (relative to project root)
        required: true
        type: string
      test_file:
        description: Test file to run (relative to project root)
        required: true
        type: string
      upstream_repo:
        description: "Upstream repo to clone (e.g. huggingface/transformers)"
        required: true
        type: string
        default: "huggingface/transformers"
      upstream_ref:
        description: "Git ref to checkout (branch/tag/sha)"
        required: false
        type: string
        default: "main"
      install_cmd:
        description: Full pip install command
        required: true
        type: string
        default: "pip install -e .[torch,testing] pytest ruff"

permissions:
  contents: read
  actions: read

jobs:
  lint-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: ${{ github.event.inputs.source_file }}

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check ${{ github.event.inputs.source_file }}

      - name: Ruff format check
        run: ruff format --check ${{ github.event.inputs.source_file }}

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        name: Checkout mutated files
        with:
          path: mutated

      - name: Clone upstream repo
        run: |
          git clone --depth 1 --branch ${{ github.event.inputs.upstream_ref }} \
            https://github.com/${{ github.event.inputs.upstream_repo }}.git project
        timeout-minutes: 5

      - name: Apply mutation
        run: |
          cp mutated/${{ github.event.inputs.source_file }} project/${{ github.event.inputs.source_file }}
          echo "Applied mutation to ${{ github.event.inputs.source_file }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ github.event.inputs.upstream_repo }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            pip-${{ github.event.inputs.upstream_repo }}-
            pip-

      - name: Install dependencies
        working-directory: project
        run: ${{ github.event.inputs.install_cmd }}

      - name: Run tests
        working-directory: project
        run: python -m pytest ${{ github.event.inputs.test_file }} -x -v --timeout=180 2>&1 | tail -200
